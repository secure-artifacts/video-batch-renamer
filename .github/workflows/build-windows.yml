name: Build Windows app

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing GitHub release tag to upload assets to, for example v1.0.0. Leave blank to only build artifact.'
        required: false
        default: 'v1.0.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependency
        run: python -m pip install --upgrade pip pyinstaller

      - name: Syntax check
        run: python -m py_compile video_renamer.py

      - name: Build exe
        run: pyinstaller --onefile --windowed --name video-batch-renamer video_renamer.py

      - name: Package Windows zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/video-batch-renamer.exe release/video-batch-renamer.exe
          Compress-Archive -Path dist/video-batch-renamer.exe, README.md -DestinationPath release/video-batch-renamer-Windows.zip -Force
          (Get-FileHash release/video-batch-renamer-Windows.zip -Algorithm SHA256).Hash | Out-File -Encoding ascii release/SHA256SUMS-Windows.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-batch-renamer-Windows
          path: |
            release/video-batch-renamer.exe
            release/video-batch-renamer-Windows.zip
            release/SHA256SUMS-Windows.txt
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: ${{ github.event_name == 'push' || inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}
        shell: pwsh
        run: |
          gh release upload "$env:RELEASE_TAG" `
            release/video-batch-renamer.exe `
            release/video-batch-renamer-Windows.zip `
            release/SHA256SUMS-Windows.txt --clobber
